name: CI

on:
  pull_request:
    branches: ['**']

jobs:
  test-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble

    env:
      DATABASE_URI: postgresql://testuser:testpass@postgres:5432/testdb
      NEXT_PUBLIC_SERVER_URL: http://localhost:3000
      PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
      CI: true
      PLAYWRIGHT_FORCE_TTY: 1

    steps:
      - uses: actions/checkout@v4

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

      - name: Run migrations
        run: npm run payload migrate

      - name: Seed database
        run: npm run db:seed

      - name: Build
        run: npm run build

      - name: Start server
        run: npm run start > server.log 2>&1 &

      - name: Wait for server
        run: timeout 180 bash -c 'until curl -sf http://localhost:3000; do sleep 2; done'

      - name: Tail server log
        run: tail -50 server.log

      - name: Run e2e tests
        run: npm run test:e2e

      - name: Stop server
        run: kill %1 || true
        if: always()

      - name: Upload server log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: server-log
          path: server.log

      - name: Upload playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
